pipeline:
  deploy:
    image: appleboy/drone-ssh:linux-amd64
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_username
      key:
        from_secret: ssh_key
    commands:
        - ssh ${{ secrets.ssh_username }}@${{ secrets.ssh_host }} "cd /home/codeberg/hugo/gomarcd.dev && git pull"